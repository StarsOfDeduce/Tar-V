<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tar V</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    <!-- Draggable Header -->
    <header class="titlebar">
      <div class="logo-area">
        <span class="app-title">Tar V</span>
      </div>
      
      <!-- Right actions: Search and Control -->
      <div class="header-actions">
        <div class="search-box no-drag">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" placeholder="输入关键字搜索...">
          <button id="clear-search" class="clear-btn" style="display:none;">&times;</button>
        </div>
        
        <button id="settings-btn" class="control-btn no-drag" title="设置">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button id="close-btn" class="control-btn no-drag close-btn-x" title="关闭窗口">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Navigation Tabs Row -->
    <div class="tabs-container" id="tabs-container">
      <div id="tabs-list" class="tabs-list">
        <!-- Tabs will be rendered here dynamically -->
      </div>
      <button id="add-tab-btn" class="add-tab-btn" title="新建标签">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <!-- Main Shortcuts Grid -->
    <main class="grid-container" id="grid-container">
      <div id="items-grid" class="items-grid">
        <!-- Grid items will be rendered here -->
      </div>
      
      <!-- Drag and Drop Overlay Hint -->
      <div id="drag-overlay" class="drag-overlay">
        <div class="drag-overlay-content">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#e04f35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p>拖拽文件、文件夹或快捷方式到此处添加</p>
        </div>
      </div>
    </main>

    <!-- Custom Right-Click Context Menu -->
    <div id="context-menu" class="context-menu" style="display: none;">
      <div class="context-item" data-action="open">
        <span class="icon">🚀</span> 打开
      </div>
      <div class="context-item" data-action="admin">
        <span class="icon">🛡️</span> 以管理员身份运行
      </div>
      <div class="context-item" data-action="location">
        <span class="icon">📂</span> 打开文件位置
      </div>
      <div class="divider"></div>
      <div class="context-item" data-action="edit">
        <span class="icon">✏️</span> 编辑属性
      </div>
      <div class="context-item text-danger" data-action="delete">
        <span class="icon">❌</span> 删除快捷方式
      </div>
    </div>

    <!-- Item Edit Dialog Modal -->
    <div id="edit-modal" class="modal-overlay" style="display: none;">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="modal-title">编辑属性</h3>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="item-name">快捷名称</label>
            <input type="text" id="item-name" placeholder="输入显示名称">
          </div>
          <div class="form-group">
            <label for="item-path">路径 / 网址</label>
            <div class="input-with-btn">
              <input type="text" id="item-path" placeholder="C:\Path\to\file.exe 或 https://...">
              <button id="browse-file-btn" class="btn-secondary" title="选择文件">文件</button>
              <button id="browse-folder-btn" class="btn-secondary" title="选择文件夹">文件夹</button>
            </div>
          </div>
          <div class="form-group">
            <label for="item-args">运行参数</label>
            <input type="text" id="item-args" placeholder="可选运行参数 (仅可执行文件有效)">
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="item-admin">
            <label for="item-admin">默认以管理员身份运行</label>
          </div>
        </div>
        <div class="modal-footer">
          <button id="modal-cancel-btn" class="btn-secondary">取消</button>
          <button id="modal-save-btn" class="btn-primary">保存</button>
        </div>
      </div>
    </div>

    <!-- Custom Dialog Modal (Alert/Confirm) -->
    <div id="dialog-modal" class="modal-overlay" style="display: none;">
      <div class="modal-box" style="width: 400px;">
        <div class="modal-header">
          <h3 id="dialog-title">提示</h3>
          <button class="modal-close" id="dialog-close-x">&times;</button>
        </div>
        <div class="modal-body" style="padding: 16px 20px; font-size: 13px; color: var(--text-primary); line-height: 1.5;">
          <p id="dialog-message" style="word-break: break-all; overflow-wrap: break-word; white-space: pre-wrap; margin: 0; text-align: left; max-height: 250px; overflow-y: auto;">提示内容</p>
        </div>
        <div class="modal-footer">
          <button id="dialog-cancel-btn" class="btn-secondary">取消</button>
          <button id="dialog-confirm-btn" class="btn-primary">确定</button>
        </div>
      </div>
    </div>

    <!-- Custom Prompt Modal -->
    <div id="prompt-modal" class="modal-overlay" style="display: none;">
      <div class="modal-box" style="width: 440px;">
        <div class="modal-header">
          <h3 id="prompt-title" style="font-size: 16px;">输入</h3>
          <button class="modal-close" id="prompt-close-x" style="font-size: 22px;">&times;</button>
        </div>
        <div class="modal-body" style="padding: 16px 20px;">
          <p id="prompt-message" style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; word-break: break-all; overflow-wrap: break-word; white-space: pre-wrap;">请输入值</p>
          <input type="text" id="prompt-input" class="dropdown-style" style="width: 100%; font-size: 15px; padding: 10px 14px; box-sizing: border-box; background: rgba(0,0,0,0.3);" placeholder="">
        </div>
        <div class="modal-footer">
          <button id="prompt-cancel-btn" class="btn-secondary" style="font-size: 14px; padding: 10px 24px;">取消</button>
          <button id="prompt-confirm-btn" class="btn-primary" style="font-size: 14px; padding: 10px 24px;">确定</button>
        </div>
      </div>
    </div>

    <!-- Batch Action Bar (Req 31) -->
    <div id="batch-action-bar" class="batch-action-bar" style="display: none;">
      <span id="batch-selected-count">已选中 0 个项目</span>
      <div class="batch-actions">
        <button id="batch-select-all-btn" class="btn-secondary btn-sm">全选</button>
        <select id="batch-move-select" class="dropdown-style">
          <option value="">移动到分组...</option>
        </select>
        <button id="batch-edit-btn" class="btn-secondary btn-sm">批量修改</button>
        <button id="batch-delete-btn" class="btn-danger btn-sm">批量删除</button>
        <button id="batch-cancel-btn" class="btn-secondary btn-sm">取消</button>
      </div>
    </div>

    <!-- Batch Edit Modal (Req 31) -->
    <div id="batch-edit-modal" class="modal-overlay" style="display: none;">
      <div class="modal-box" style="width: 380px;">
        <div class="modal-header">
          <h3 id="batch-edit-title">批量修改属性</h3>
          <button class="modal-close" id="batch-edit-close-x">&times;</button>
        </div>
        <div class="modal-body" style="padding: 16px 20px;">
          <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;">勾选想要修改的属性并设置新值：</p>
          
          <!-- Toggle Admin Option -->
          <div class="form-group" style="margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">
            <div class="checkbox-group">
              <input type="checkbox" id="batch-enable-admin">
              <label for="batch-enable-admin" style="font-weight: 600;">修改“管理员身份运行”属性</label>
            </div>
            <div class="checkbox-group" style="margin-left: 22px; margin-top: 6px;">
              <input type="checkbox" id="batch-item-admin">
              <label for="batch-item-admin">默认以管理员身份运行</label>
            </div>
          </div>

          <!-- Toggle Args Option -->
          <div class="form-group" style="margin-bottom: 8px;">
            <div class="checkbox-group">
              <input type="checkbox" id="batch-enable-args">
              <label for="batch-enable-args" style="font-weight: 600;">修改“运行参数”属性</label>
            </div>
            <div style="margin-left: 22px; margin-top: 6px;">
              <input type="text" id="batch-item-args" class="dropdown-style" style="width: 100%; box-sizing: border-box; font-size: 12px; padding: 6px 10px;" placeholder="输入新的运行参数 (留空表示清除参数)">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="batch-edit-cancel-btn" class="btn-secondary">取消</button>
          <button id="batch-edit-save-btn" class="btn-primary">保存修改</button>
        </div>
      </div>
    </div>

  </div> <!-- Close app-container -->

  <script src="renderer.js"></script>
</body>
</html>
